<!DOCTYPE html>
<html>
  <head>
    <title>Images</title>
  </head>
  <body>
    <h1>Images</h1>

    <h2>JPG's</h2>

    <p>JPG format are good for photos</p>

    <img src="./images/mochi.jpg" width="75" alt="A mochi ball in bubble">


    <h2>GIF's</h2>

    <p>GIFs are good for animations</p>

    <img src="./images/mochi.gif" width="75" alt="A mochi ball bouncing">

    <h2>PNG's</h2>

    <p>PNG format are good for icon and diagram</p>

    <img src="./images/mochi.png" width="75" alt="A mochi ball">

    <h2>SVGs</h2>

    <p>SVGs are <em>amazing</em>. Use them wherever you can.</p>

    <img src='images/mochi.svg' width="75" alt="A mochi ball with Bezier handles">



  </body>
</html>
